name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-groups
      - run: uv run pytest --tb=short

  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"

          PYPROJECT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)

          INIT_VERSION=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/dash_form_factory/__init__.py)

          echo "Tag version:        $TAG_VERSION"
          echo "pyproject.toml:     $PYPROJECT_VERSION"
          echo "__init__.py:        $INIT_VERSION"

          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) does not match pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) does not match __init__.py ($INIT_VERSION)"
            exit 1
          fi

          echo "All versions match: $TAG_VERSION"

  publish:
    needs: [test, verify-version]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv build
      - run: uv publish --trusted-publishing always
